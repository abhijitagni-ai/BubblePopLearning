<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bubble Pop Learning Game - Ultimate Edition</title>
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            background: linear-gradient(to bottom, #87CEEB, #E0F6FF);
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            touch-action: manipulation;
        }

        /* --- Menus & Screens --- */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: rgba(255, 255, 255, 0.85);
            z-index: 200;
        }
        #game-screen, #main-menu, #level-select-screen, #win-screen { display: none; } 
        #game-screen { background: transparent; z-index: 10; }

        h1 { font-size: 40px; color: #FF9500; text-align: center; margin-bottom: 20px; text-shadow: 2px 2px white;}
        h2 { color: #FF3B30; text-shadow: 1px 1px white; margin: 0;}
        
        .profile-badge {
            background: white; padding: 10px 20px; border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 3px solid #FF9500;
            margin-bottom: 20px; text-align: center; font-size: 20px; color: #333;
        }
        .profile-badge span { color: #007AFF; font-weight: bold; font-size: 24px;}
        
        /* New Mistake Summary Box */
        .summary-box {
            background: #FFF9C4; padding: 10px 20px; border-radius: 15px; border: 2px dashed #FF9500;
            margin-bottom: 15px; font-size: 18px; color: #555; text-align: center; max-width: 80%;
        }

        input[type="text"] {
            padding: 15px; font-size: 24px; border: 3px solid #007AFF; 
            border-radius: 15px; text-align: center; margin-bottom: 20px; width: 80%; max-width: 300px;
        }

        button {
            padding: 15px 30px; margin: 8px; font-size: 22px; font-weight: bold;
            color: white; border: none; border-radius: 30px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: 0.2s;
            width: 80%; max-width: 400px;
        }
        .btn-start { background: #4CAF50; }
        .btn-settings { background: #007AFF; }
        .btn-level { background: #FF9500; }
        .btn-speed { background: #9C27B0; } /* Purple for speed setting */
        button:active { transform: scale(0.95); }

        /* --- In-Game Top Bar --- */
        #ui-bar {
            position: absolute; top: 0; width: 100%; padding: 15px;
            background: rgba(255, 255, 255, 0.7); border-bottom: 3px solid white;
            display: flex; justify-content: space-between; align-items: center;
            box-sizing: border-box; z-index: 100;
        }
        .controls button { padding: 8px 15px; font-size: 16px; margin: 0 5px; width: auto;}

        /* --- Bubbles --- */
        #game-area { width: 100vw; height: 100vh; position: relative; }
        .bubble {
            position: absolute; border-radius: 50%; cursor: pointer;
            background-image: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9) 5%, rgba(255,255,255,0.1) 40%, rgba(255,255,255,0) 60%);
            box-shadow: inset 0 0 20px rgba(255,255,255,0.6), inset 10px 0 40px rgba(255,255,255,0.3), 0 4px 10px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5); backdrop-filter: blur(2px);
            animation: wobble 3s ease-in-out infinite alternate;
            
            display: flex; justify-content: center; align-items: center;
            font-size: 38px; font-weight: bold; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
        }
        
        .color-red { background-color: rgba(255, 59, 48, 0.5); }
        .color-blue { background-color: rgba(0, 122, 255, 0.5); }
        .color-green { background-color: rgba(52, 199, 89, 0.5); }
        .color-yellow { background-color: rgba(255, 204, 0, 0.5); }

        .text-word { font-size: 26px; } 
        .text-shape { font-size: 45px; } 
        
        @keyframes wobble { 0% { transform: translateX(0) scale(1); } 100% { transform: translateX(20px) scale(1.05); } }
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        /* Floating Feedback Words */
        .feedback-text {
            position: absolute; font-weight: bold; text-shadow: 2px 2px white;
            pointer-events: none; animation: floatUpFade 1.2s forwards; z-index: 150;
            text-align: center; transform: translate(-50%, -50%); 
        }
        @keyframes floatUpFade { 0% { opacity: 1; transform: translate(-50%, 0) scale(1); } 100% { opacity: 0; transform: translate(-50%, -50px) scale(1.2); } }
        
        /* Phase Shift Big Text */
        .phase-shift-text {
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
            font-size: 45px; font-weight: bold; color: #FF9500; text-shadow: 3px 3px white;
            z-index: 150; pointer-events: none; animation: popInFadeOut 2.5s forwards; text-align: center; width: 100%;
        }
        @keyframes popInFadeOut {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
        }

    </style>
</head>
<body>

    <div id="login-screen" class="screen">
        <h1>Welcome!</h1>
        <h2 style="margin-bottom:20px;">What is your name?</h2>
        <input type="text" id="player-name-input" placeholder="Type name here...">
        <button class="btn-start" onclick="saveProfile()">Save & Play!</button>
    </div>

    <div id="main-menu" class="screen">
        <h1>Bubble Pop!</h1>
        <div class="profile-badge">
            Hello, <span id="display-name">Player</span>!<br>
            Rank: <span id="display-rank" style="color:#FF9500;">Beginner</span><br>
            XP: <span id="display-xp" style="color:#4CAF50;">0</span>
        </div>
        <button class="btn-start" onclick="showLevelSelect()">Play Game</button>
        <button class="btn-speed" id="speed-toggle-btn" onclick="toggleSpeed()">Speed: Normal</button>
        <button class="btn-settings" style="background:#8E8E93" onclick="resetProfile()">Reset Player (Parents)</button>
    </div>

    <div id="level-select-screen" class="screen">
        <h1 style="font-size: 30px;">Select Category</h1>
        <button class="btn-level" onclick="startLevel(1)">Level 1: Colors</button>
        <button class="btn-level" onclick="startLevel(2)">Level 2: Alphabets</button>
        <button class="btn-level" onclick="startLevel(3)">Level 3: Numbers</button>
        <button class="btn-level" style="background:#AF52DE" onclick="startLevel(4)">Level 4: Shapes</button>
        <button class="btn-level" style="background:#FF2D55" onclick="startLevel(5)">Level 5: Words</button>
        <button class="btn-settings" onclick="showMainMenu()">⬅ Back</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="ui-bar">
            <div>
                <h2 id="instruction-text">Instruction</h2>
                <div style="font-size: 20px; color: #4CAF50; font-weight: bold;">Score: <span id="score">0</span> / <span id="target-score">9</span></div>
            </div>
            <div class="controls">
                <button class="btn-settings" style="background:#FF3B30" onclick="quitGame()">Quit</button>
            </div>
        </div>
        <div id="game-area"></div>
    </div>

    <div id="win-screen" class="screen">
        <h1 id="win-title">Level Complete! ⭐⭐⭐</h1>
        <div class="profile-badge" style="border-color:#4CAF50; margin-bottom: 10px;">
            +10 XP Earned!<br>
            New Rank: <span id="win-rank">...</span>
        </div>
        
        <div id="mistake-summary" class="summary-box">
            Perfect Score! 🌟
        </div>
        
        <button class="btn-start" onclick="showLevelSelect()">Next Level</button>
    </div>

    <script>
        // --- GLOBAL SETTINGS ---
        let playerName = "Player";
        let playerXP = 0;
        
        // Speed Multiplier Settings
        let speedModes = [{label: "Slow", mult: 0.6}, {label: "Normal", mult: 1.0}, {label: "Fast", mult: 1.6}];
        let currentSpeedIndex = 1; // Default to Normal
        let gameSpeedMultiplier = 1.0;

        function toggleSpeed() {
            currentSpeedIndex = (currentSpeedIndex + 1) % speedModes.length;
            gameSpeedMultiplier = speedModes[currentSpeedIndex].mult;
            document.getElementById('speed-toggle-btn').innerText = `Speed: ${speedModes[currentSpeedIndex].label}`;
        }

        // --- PROFILE SYSTEM ---
        function getRank(xp) {
            if (xp >= 100) return "Grand Master! 👑";
            if (xp >= 50) return "Super Ninja 🥷";
            if (xp >= 20) return "Star Popper ⭐";
            return "Bubble Cadet 🎖️";
        }

        function loadProfile() {
            const savedName = localStorage.getItem('bubbleGameName');
            const savedXP = localStorage.getItem('bubbleGameXP');
            if (savedName) {
                playerName = savedName; playerXP = savedXP ? parseInt(savedXP) : 0;
                updateMenuUI(); showMainMenu();
            } else {
                document.getElementById('login-screen').style.display = 'flex';
            }
        }

        function saveProfile() {
            const input = document.getElementById('player-name-input').value.trim();
            if (input === "") return alert("Please enter your name!");
            playerName = input; playerXP = 0; 
            localStorage.setItem('bubbleGameName', playerName); localStorage.setItem('bubbleGameXP', playerXP);
            updateMenuUI(); document.getElementById('login-screen').style.display = 'none';
            showMainMenu(); speak(`Welcome, ${playerName}!`);
        }

        function awardXP() {
            playerXP += 10; localStorage.setItem('bubbleGameXP', playerXP);
            updateMenuUI(); document.getElementById('win-rank').innerText = getRank(playerXP);
        }

        function resetProfile() {
            if(confirm("Parents: Delete this profile?")) { localStorage.clear(); location.reload(); }
        }

        function updateMenuUI() {
            document.getElementById('display-name').innerText = playerName;
            document.getElementById('display-xp').innerText = playerXP;
            document.getElementById('display-rank').innerText = getRank(playerXP);
        }

        // --- GAME CONFIG ---
        const alphabetsArray = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        const numbersArray = "0123456789".split("");
        const colorsArray = ['red', 'blue', 'green', 'yellow'];
        const shapesArray = ['▲', '■', '●', '★'];
        const wordsArray = ['CAT', 'DOG', 'SUN', 'BUG', 'COW', 'HAT', 'PIG'];
        const shapesNamesMap = {'▲': 'Triangle', '■': 'Square', '●': 'Circle', '★': 'Star'};

        const levelConfig = {
            1: { type: 'color', options: colorsArray, goalScore: 9, getInstruction: (t) => `Pop the ${t.toUpperCase()} bubbles!` },
            2: { type: 'text', options: alphabetsArray, goalScore: 9, getInstruction: (t) => `Pop the letter ${t}!` },
            3: { type: 'text', options: numbersArray, goalScore: 9, getInstruction: (t) => `Pop the number ${t}!` },
            4: { type: 'shape', options: shapesArray, goalScore: 9, getInstruction: (t) => `Pop the ${shapesNamesMap[t]}!` },
            5: { type: 'word', options: wordsArray, goalScore: 9, getInstruction: (t) => `Pop the word ${t}!` }
        };

        const happyWords = ["Yay!", "Awesome!", "Super!"];
        
        let currentLevelId = 1; let currentScore = 0; let phaseScore = 0; let gameActive = false;
        let spawnInterval; let currentTarget = ""; 
        let mistakesTracker = []; // Array to track incorrect taps!
        const gameArea = document.getElementById('game-area');

        // --- Text-to-Speech ---
        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const msg = new SpeechSynthesisUtterance(text);
                msg.rate = 0.9; window.speechSynthesis.speak(msg);
            }
        }
        function getSpokenName(type, value) { return type === 'shape' ? shapesNamesMap[value] : value; }

        // --- Navigation ---
        function hideAllScreens() { document.querySelectorAll('.screen').forEach(s => s.style.display = 'none'); }
        function showMainMenu() { hideAllScreens(); document.getElementById('main-menu').style.display = 'flex'; }
        function showLevelSelect() { hideAllScreens(); document.getElementById('level-select-screen').style.display = 'flex'; }
        function quitGame() { gameActive = false; clearInterval(spawnInterval); showMainMenu(); window.speechSynthesis.cancel(); }

        // --- Core Game Logic ---
        function startLevel(levelId) {
            currentLevelId = levelId;
            const config = levelConfig[currentLevelId];
            currentTarget = config.options[Math.floor(Math.random() * config.options.length)];
            
            document.getElementById('instruction-text').innerText = config.getInstruction(currentTarget);
            document.getElementById('target-score').innerText = config.goalScore;
            
            hideAllScreens(); document.getElementById('game-screen').style.display = 'block';
            
            currentScore = 0; phaseScore = 0; mistakesTracker = []; // Reset mistakes!
            document.getElementById('score').innerText = currentScore;
            gameArea.innerHTML = ''; gameActive = true;
            
            speak(config.getInstruction(currentTarget));
            spawnInterval = setInterval(createBubble, 1200);
        }

        function changeTargetMidLevel() {
            const config = levelConfig[currentLevelId];
            const oldTarget = currentTarget;
            do { currentTarget = config.options[Math.floor(Math.random() * config.options.length)]; } while (currentTarget === oldTarget);

            document.getElementById('instruction-text').innerText = config.getInstruction(currentTarget);
            document.querySelectorAll('.bubble').forEach(b => b.remove());

            const spokenItem = getSpokenName(config.type, currentTarget);
            speak(`Awesome! Now find ${spokenItem}!`);

            const announceText = document.createElement('div');
            announceText.innerText = `Now find ${spokenItem}!`;
            announceText.classList.add('phase-shift-text');
            gameArea.appendChild(announceText);
            setTimeout(() => announceText.remove(), 2500);
        }

        function createBubble() {
            if (!gameActive) return;
            const config = levelConfig[currentLevelId];
            const bubble = document.createElement('div');
            bubble.classList.add('bubble');
            
            const isTarget = Math.random() < 0.35; 
            const bubbleValue = isTarget ? currentTarget : config.options[Math.floor(Math.random() * config.options.length)];
            bubble.dataset.value = bubbleValue; 

            if (config.type === 'color') {
                bubble.classList.add('color-' + bubbleValue);
            } else {
                const randomBgColor = colorsArray[Math.floor(Math.random() * colorsArray.length)];
                bubble.classList.add('color-' + randomBgColor);
                bubble.innerText = bubbleValue;
                if (config.type === 'word') bubble.classList.add('text-word');
                if (config.type === 'shape') bubble.classList.add('text-shape');
            }
            
            const size = Math.floor(Math.random() * 40) + 75; 
            bubble.style.width = size + 'px'; bubble.style.height = size + 'px';
            bubble.style.left = Math.floor(Math.random() * (window.innerWidth - size)) + 'px';
            bubble.style.bottom = '-120px';
            
            gameArea.appendChild(bubble);

            let bottomPos = -120;
            // MULTIPLY SPEED BY OUR NEW SETTING
            const floatSpeed = (Math.random() * 1.5 + 1) * gameSpeedMultiplier; 
            
            function floatUp() {
                if (!gameActive) return;
                bottomPos += floatSpeed;
                bubble.style.bottom = bottomPos + 'px';
                if (bottomPos > window.innerHeight + 100) bubble.remove();
                else requestAnimationFrame(floatUp);
            }
            requestAnimationFrame(floatUp);

            bubble.addEventListener('mousedown', function() { handleTap(bubble); });
            bubble.addEventListener('touchstart', function(e) { e.preventDefault(); handleTap(bubble); });
        }

        function handleTap(bubble) {
            if (!gameActive) return;
            const rect = bubble.getBoundingClientRect();
            const clickedValue = bubble.dataset.value;
            const config = levelConfig[currentLevelId];
            const centerX = rect.left + (rect.width / 2);

            if (clickedValue === currentTarget) {
                currentScore++; phaseScore++; 
                document.getElementById('score').innerText = currentScore;
                bubble.remove();
                
                if (currentScore >= config.goalScore) {
                    gameActive = false; clearInterval(spawnInterval); awardXP(); 
                    
                    // --- PREPARE THE POST-MATCH REPORT ---
                    const summaryBox = document.getElementById('mistake-summary');
                    if (mistakesTracker.length === 0) {
                        summaryBox.innerHTML = "<strong>Perfect Score! 🌟</strong><br>You made 0 mistakes!";
                        summaryBox.style.borderColor = "#4CAF50";
                    } else {
                        // Get unique mistakes so we don't list 'C' ten times
                        const uniqueMistakes = [...new Set(mistakesTracker)]; 
                        const translatedMistakes = uniqueMistakes.map(m => getSpokenName(config.type, m)).join(", ");
                        summaryBox.innerHTML = `<strong>Review Needed:</strong><br>Oops, you tapped: ${translatedMistakes}`;
                        summaryBox.style.borderColor = "#FF3B30";
                    }
                    
                    speak(`Level Complete! Great job, ${playerName}!`);
                    setTimeout(() => { hideAllScreens(); document.getElementById('win-screen').style.display = 'flex'; }, 800);
                } else if (phaseScore >= 3) {
                    phaseScore = 0; changeTargetMidLevel();
                } else {
                    const happyPhrase = happyWords[Math.floor(Math.random() * happyWords.length)];
                    speak(happyPhrase); showFloatingText(happyPhrase, centerX, rect.top, '#4CAF50', '28px');
                }
            } else {
                bubble.classList.add('shake');
                
                // TRACK THE MISTAKE!
                mistakesTracker.push(clickedValue);

                const spokenItem = getSpokenName(config.type, clickedValue);
                const oopsMessage = `Oops, this is ${spokenItem}!`;
                speak(oopsMessage); 
                showFloatingText(oopsMessage, centerX, rect.top, '#FF3B30', '24px');
                setTimeout(() => bubble.classList.remove('shake'), 400);
            }
        }

        function showFloatingText(text, x, y, color, fontSize) {
            const word = document.createElement('div');
            word.innerText = text; word.classList.add('feedback-text');
            word.style.left = x + 'px'; word.style.top = y + 'px'; 
            word.style.color = color; word.style.fontSize = fontSize;
            gameArea.appendChild(word);
            setTimeout(() => word.remove(), 1200);
        }

        // Initialize
        window.onload = loadProfile;
    </script>
</body>
</html>
